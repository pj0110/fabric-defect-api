<!DOCTYPE html>
<html>

<head>

    <title>Fabric Defect Detection</title>

    <style>

        body{
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #f2f2f2;
        }

        .container{
            width: 400px;
            margin: auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button{
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }

        button:hover{
            background: darkblue;
        }

        img{
            margin-top: 20px;
            width: 250px;
            border-radius: 10px;
        }

        #result{
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Fabric Defect Detection</h2>

        <input type="file" id="imageInput">

        <br><br>

        <button onclick="uploadImage()">
            Predict
        </button>

        <br><br>

        <img id="preview">

        <h3 id="result"></h3>

    </div>

    <script>

        const imageInput =
            document.getElementById("imageInput");

        imageInput.addEventListener(
            "change",
            function(){

                const file =
                    imageInput.files[0];

                if(file){

                    document.getElementById(
                        "preview"
                    ).src =
                        URL.createObjectURL(file);
                }
            }
        );

        async function uploadImage(){

            const file =
                imageInput.files[0];

            if(!file){

                alert(
                    "Please select an image"
                );

                return;
            }

            document.getElementById(
                "result"
            ).innerHTML =
                "Predicting... Please wait";

            const formData =
                new FormData();

            formData.append(
                "file",
                file
            );

            try{

                const response =
                    await fetch(
                        "/predict",
                        {
                            method: "POST",
                            body: formData
                        }
                    );

                const data =
                    await response.json();

                console.log(data);

                if(data.error){

                    document.getElementById(
                        "result"
                    ).innerHTML =
                        "Error: " + data.error;

                    return;
                }

                document.getElementById(
                    "result"
                ).innerHTML =
                    `
                    Prediction:
                    ${data.prediction}

                    <br><br>

                    Confidence:
                    ${data.confidence}%
                    `;

            }
            catch(error){

                console.log(error);

                document.getElementById(
                    "result"
                ).innerHTML =
                    "Prediction failed";
            }
        }

    </script>

</body>

</html>
